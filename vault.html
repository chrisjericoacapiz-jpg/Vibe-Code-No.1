<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vault — Your Personal File Storage</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap');

    :root {
      --bg: #0d0f14;
      --surface: #161a23;
      --surface2: #1e2330;
      --border: #2a3045;
      --accent: #5b6ef5;
      --accent2: #8b9bff;
      --text: #e8eaf2;
      --muted: #7a829e;
      --danger: #f5616a;
      --success: #4ecb8e;
      --img-color: #7b5ea7;
      --vid-color: #e06c4e;
      --doc-color: #4e9ee0;
      --other-color: #4ecb8e;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Grotesk', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 36px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 100;
      backdrop-filter: blur(8px);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: 'Space Mono', monospace;
      font-weight: 700;
      font-size: 1.2rem;
      letter-spacing: -0.5px;
    }

    .logo-icon {
      width: 34px;
      height: 34px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .header-stats {
      display: flex;
      gap: 24px;
      font-size: 0.78rem;
      color: var(--muted);
      font-family: 'Space Mono', monospace;
    }

    .stat-val {
      color: var(--text);
      font-weight: 700;
      display: block;
      font-size: 1rem;
    }

    .header-actions {
      display: flex;
      gap: 10px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 9px 18px;
      border-radius: 8px;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 600;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s;
      border: none;
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
    }

    .btn-primary:hover {
      background: var(--accent2);
      transform: translateY(-1px);
    }

    .btn-ghost {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
    }

    .btn-ghost:hover {
      color: var(--text);
      border-color: var(--accent);
    }

    /* ── Drop Zone ── */
    .drop-zone {
      margin: 36px;
      border: 2px dashed var(--border);
      border-radius: 16px;
      padding: 52px 40px;
      text-align: center;
      cursor: pointer;
      transition: all 0.25s;
      background: var(--surface);
      position: relative;
      overflow: hidden;
    }

    .drop-zone::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 120%, rgba(91, 110, 245, 0.12) 0%, transparent 70%);
      pointer-events: none;
    }

    .drop-zone.dragging {
      border-color: var(--accent);
      background: rgba(91, 110, 245, 0.08);
      transform: scale(1.005);
    }

    .drop-zone:hover {
      border-color: var(--accent);
    }

    .drop-icon {
      font-size: 3rem;
      margin-bottom: 14px;
      display: block;
      opacity: 0.6;
    }

    .drop-title {
      font-size: 1.3rem;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .drop-sub {
      color: var(--muted);
      font-size: 0.88rem;
      margin-bottom: 20px;
    }

    .drop-sub span {
      color: var(--accent2);
      font-weight: 600;
    }

    #file-input {
      display: none;
    }

    /* ── Progress bar ── */
    .upload-progress {
      display: none;
      margin: 0 36px 16px;
      background: var(--surface);
      border-radius: 8px;
      padding: 14px 18px;
      border: 1px solid var(--border);
    }

    .upload-progress.active {
      display: block;
    }

    .progress-label {
      display: flex;
      justify-content: space-between;
      font-size: 0.82rem;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .progress-bar-track {
      height: 6px;
      background: var(--border);
      border-radius: 99px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 99px;
      width: 0%;
      transition: width 0.1s;
    }

    /* ── Toolbar ── */
    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 36px 20px;
      flex-wrap: wrap;
      gap: 12px;
    }

    .filter-tabs {
      display: flex;
      gap: 6px;
      background: var(--surface);
      padding: 4px;
      border-radius: 10px;
      border: 1px solid var(--border);
    }

    .tab {
      padding: 6px 14px;
      border-radius: 7px;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.18s;
      color: var(--muted);
      border: none;
      background: none;
      font-family: 'Space Grotesk', sans-serif;
    }

    .tab.active {
      background: var(--accent);
      color: #fff;
    }

    .tab:hover:not(.active) {
      color: var(--text);
    }

    .search-box {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 7px 14px;
      flex: 0 0 260px;
    }

    .search-box input {
      background: none;
      border: none;
      color: var(--text);
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.85rem;
      outline: none;
      width: 100%;
    }

    .search-box input::placeholder {
      color: var(--muted);
    }

    .sort-select {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 7px 12px;
      color: var(--muted);
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.82rem;
      outline: none;
      cursor: pointer;
    }

    /* ── File Grid ── */
    .file-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 16px;
      padding: 0 36px 36px;
    }

    .file-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .file-card:hover {
      border-color: var(--accent);
      transform: translateY(-3px);
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.35);
    }

    .file-card.selected {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px var(--accent);
    }

    .file-thumb {
      height: 130px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      position: relative;
      overflow: hidden;
    }

    .file-thumb img,
    .file-thumb video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      position: absolute;
      inset: 0;
    }

    .thumb-img {
      background: linear-gradient(135deg, rgba(123, 94, 167, 0.3), rgba(123, 94, 167, 0.1));
    }

    .thumb-vid {
      background: linear-gradient(135deg, rgba(224, 108, 78, 0.3), rgba(224, 108, 78, 0.1));
    }

    .thumb-doc {
      background: linear-gradient(135deg, rgba(78, 158, 224, 0.3), rgba(78, 158, 224, 0.1));
    }

    .thumb-other {
      background: linear-gradient(135deg, rgba(78, 203, 142, 0.3), rgba(78, 203, 142, 0.1));
    }

    .type-badge {
      position: absolute;
      top: 8px;
      right: 8px;
      font-family: 'Space Mono', monospace;
      font-size: 0.62rem;
      padding: 2px 7px;
      border-radius: 4px;
      font-weight: 700;
      text-transform: uppercase;
    }

    .badge-img {
      background: rgba(123, 94, 167, 0.85);
      color: #e8d4ff;
    }

    .badge-vid {
      background: rgba(224, 108, 78, 0.85);
      color: #ffddd4;
    }

    .badge-doc {
      background: rgba(78, 158, 224, 0.85);
      color: #d4e8ff;
    }

    .badge-other {
      background: rgba(78, 203, 142, 0.85);
      color: #d4ffe8;
    }

    .select-check {
      position: absolute;
      top: 8px;
      left: 8px;
      width: 22px;
      height: 22px;
      border-radius: 6px;
      border: 2px solid rgba(255, 255, 255, 0.35);
      background: rgba(0, 0, 0, 0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.2s;
      backdrop-filter: blur(4px);
    }

    .file-card:hover .select-check,
    .file-card.selected .select-check {
      opacity: 1;
    }

    .file-card.selected .select-check {
      background: var(--accent);
      border-color: var(--accent);
    }

    .file-info {
      padding: 12px 14px;
    }

    .file-name {
      font-weight: 600;
      font-size: 0.85rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 4px;
    }

    .file-meta {
      display: flex;
      justify-content: space-between;
      font-size: 0.74rem;
      color: var(--muted);
      font-family: 'Space Mono', monospace;
    }

    /* ── Empty state ── */
    .empty-state {
      display: none;
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
      grid-column: 1 / -1;
    }

    .empty-state.visible {
      display: block;
    }

    .empty-state .icon {
      font-size: 3.5rem;
      margin-bottom: 16px;
      opacity: 0.4;
    }

    .empty-state p {
      font-size: 1rem;
    }

    /* ── Context actions (bulk) ── */
    .bulk-bar {
      display: none;
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 20px;
      gap: 12px;
      align-items: center;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5);
      z-index: 200;
      font-size: 0.85rem;
      font-weight: 600;
      white-space: nowrap;
    }

    .bulk-bar.active {
      display: flex;
    }

    .bulk-count {
      background: var(--accent);
      color: #fff;
      border-radius: 6px;
      padding: 3px 10px;
      font-family: 'Space Mono', monospace;
      font-size: 0.78rem;
    }

    .btn-danger {
      background: transparent;
      color: var(--danger);
      border: 1px solid var(--danger);
      padding: 7px 14px;
      border-radius: 7px;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 600;
      font-size: 0.82rem;
      cursor: pointer;
      transition: all 0.18s;
    }

    .btn-danger:hover {
      background: var(--danger);
      color: #fff;
    }

    /* ── Lightbox / Preview ── */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.88);
      z-index: 500;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(6px);
    }

    .lightbox.open {
      display: flex;
    }

    .lightbox-inner {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      max-width: 820px;
      width: 92vw;
      max-height: 88vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      animation: popIn 0.22s ease;
    }

    @keyframes popIn {
      from {
        opacity: 0;
        transform: scale(0.94);
      }

      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    .lightbox-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      gap: 12px;
    }

    .lightbox-title {
      font-weight: 700;
      font-size: 0.95rem;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .lightbox-actions {
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }

    .lightbox-body {
      flex: 1;
      overflow: auto;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      min-height: 200px;
    }

    .lightbox-body img {
      max-width: 100%;
      max-height: 55vh;
      border-radius: 8px;
      object-fit: contain;
    }

    .lightbox-body video {
      max-width: 100%;
      max-height: 55vh;
      border-radius: 8px;
      outline: none;
    }

    .lightbox-body iframe {
      width: 100%;
      min-height: 450px;
      border: none;
      border-radius: 8px;
    }

    .lightbox-body .file-placeholder {
      text-align: center;
      color: var(--muted);
    }

    .lightbox-body .file-placeholder .big-icon {
      font-size: 4rem;
      margin-bottom: 12px;
    }

    .lightbox-meta {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      padding: 16px 20px;
      border-top: 1px solid var(--border);
      font-size: 0.8rem;
    }

    .meta-item {
      color: var(--muted);
    }

    .meta-item strong {
      color: var(--text);
      display: block;
    }

    /* ── Toast ── */
    .toast-container {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 999;
      display: flex;
      flex-direction: column;
      gap: 8px;
      pointer-events: none;
    }

    .toast {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent);
      border-radius: 10px;
      padding: 11px 16px;
      font-size: 0.84rem;
      font-weight: 500;
      animation: slideIn 0.25s ease, fadeOut 0.3s ease 2.5s forwards;
      max-width: 280px;
    }

    .toast.error {
      border-left-color: var(--danger);
    }

    .toast.success {
      border-left-color: var(--success);
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateX(20px);
      }

      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    @keyframes fadeOut {
      to {
        opacity: 0;
        transform: translateX(20px);
      }
    }

    /* Close button */
    .close-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      width: 32px;
      height: 32px;
      border-radius: 7px;
      font-size: 1.1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.18s;
      flex-shrink: 0;
    }

    .close-btn:hover {
      color: var(--text);
      border-color: var(--accent);
    }

    /* Responsive */
    @media (max-width: 680px) {
      header {
        padding: 14px 18px;
      }

      .header-stats {
        display: none;
      }

      .drop-zone,
      .toolbar,
      .file-grid {
        margin-left: 18px;
        margin-right: 18px;
        padding-left: 18px;
        padding-right: 18px;
      }

      .file-grid {
        padding: 0 18px 36px;
        grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      }

      .search-box {
        flex: 1;
      }
    }
  </style>
</head>

<body>

  <!-- Header -->
  <header>
    <div class="logo">
      <div class="logo-icon">🗄️</div>
      Vault
    </div>
    <div class="header-stats">
      <div>
        <span class="stat-val" id="stat-count">0</span>
        files
      </div>
      <div>
        <span class="stat-val" id="stat-size">0 B</span>
        stored
      </div>
    </div>
    <div class="header-actions">
      <button class="btn btn-ghost" onclick="clearAll()">🗑 Clear All</button>
      <button class="btn btn-primary" onclick="document.getElementById('file-input').click()">
        ＋ Upload Files
      </button>
    </div>
  </header>

  <!-- Drop Zone -->
  <div class="drop-zone" id="drop-zone" onclick="document.getElementById('file-input').click()">
    <span class="drop-icon">📂</span>
    <div class="drop-title">Drop anything here</div>
    <div class="drop-sub">
      Images, videos, documents — <span>any size, any type</span>. They stay right here in your browser.
    </div>
    <button class="btn btn-primary" style="pointer-events:none;">Browse Files</button>
  </div>

  <input type="file" id="file-input" multiple>

  <!-- Upload Progress -->
  <div class="upload-progress" id="upload-progress">
    <div class="progress-label">
      <span id="progress-name">Uploading…</span>
      <span id="progress-pct">0%</span>
    </div>
    <div class="progress-bar-track">
      <div class="progress-bar-fill" id="progress-fill"></div>
    </div>
  </div>

  <!-- Toolbar -->
  <div class="toolbar">
    <div class="filter-tabs">
      <button class="tab active" data-filter="all">All</button>
      <button class="tab" data-filter="image">🖼 Images</button>
      <button class="tab" data-filter="video">🎬 Videos</button>
      <button class="tab" data-filter="doc">📄 Docs</button>
      <button class="tab" data-filter="other">📦 Other</button>
    </div>
    <div style="display:flex; gap:10px; align-items:center; flex-wrap:wrap;">
      <div class="search-box">
        <span style="color:var(--muted)">🔍</span>
        <input type="text" id="search-input" placeholder="Search files…">
      </div>
      <select class="sort-select" id="sort-select">
        <option value="newest">Newest first</option>
        <option value="oldest">Oldest first</option>
        <option value="name">Name A–Z</option>
        <option value="size-desc">Largest first</option>
        <option value="size-asc">Smallest first</option>
      </select>
    </div>
  </div>

  <!-- File Grid -->
  <div class="file-grid" id="file-grid">
    <div class="empty-state visible" id="empty-state">
      <div class="icon">🗄️</div>
      <p>Your Vault is empty.<br>Drop some files above to get started.</p>
    </div>
  </div>

  <!-- Bulk action bar -->
  <div class="bulk-bar" id="bulk-bar">
    <span class="bulk-count" id="bulk-count">0 selected</span>
    <button class="btn btn-ghost" onclick="downloadSelected()">⬇ Download</button>
    <button class="btn-danger" onclick="deleteSelected()">🗑 Delete</button>
    <button class="btn btn-ghost" onclick="clearSelection()">✕ Cancel</button>
  </div>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox" onclick="closeLightbox(event)">
    <div class="lightbox-inner" onclick="e => e.stopPropagation()">
      <div class="lightbox-header">
        <div class="lightbox-title" id="lb-title">filename.jpg</div>
        <div class="lightbox-actions">
          <button class="btn btn-primary" id="lb-download" onclick="downloadFile(currentFile)">⬇ Download</button>
          <button class="close-btn" onclick="closeLightbox()">✕</button>
        </div>
      </div>
      <div class="lightbox-body" id="lb-body"></div>
      <div class="lightbox-meta" id="lb-meta"></div>
    </div>
  </div>

  <!-- Toast container -->
  <div class="toast-container" id="toast-container"></div>

  <script>
    // ─── State ──────────────────────────────────────────────────────────────────
    let db;
    let allFiles = [];
    let currentFilter = 'all';
    let currentSearch = '';
    let currentSort = 'newest';
    let selectedIds = new Set();
    let currentFile = null;

    // ─── IndexedDB ──────────────────────────────────────────────────────────────
    function openDB() {
      return new Promise((res, rej) => {
        const req = indexedDB.open('VaultDB', 1);
        req.onupgradeneeded = e => {
          const db = e.target.result;
          if (!db.objectStoreNames.contains('files')) {
            const store = db.createObjectStore('files', { keyPath: 'id' });
            store.createIndex('added', 'added');
          }
        };
        req.onsuccess = e => res(e.target.result);
        req.onerror = e => rej(e.target.error);
      });
    }

    async function saveFileToDB(fileObj) {
      const tx = db.transaction('files', 'readwrite');
      tx.objectStore('files').put(fileObj);
      return new Promise((res, rej) => {
        tx.oncomplete = res;
        tx.onerror = rej;
      });
    }

    async function deleteFileFromDB(id) {
      const tx = db.transaction('files', 'readwrite');
      tx.objectStore('files').delete(id);
      return new Promise((res, rej) => {
        tx.oncomplete = res;
        tx.onerror = rej;
      });
    }

    async function clearDB() {
      const tx = db.transaction('files', 'readwrite');
      tx.objectStore('files').clear();
      return new Promise((res, rej) => {
        tx.oncomplete = res;
        tx.onerror = rej;
      });
    }

    async function loadAllFromDB() {
      const tx = db.transaction('files', 'readonly');
      const store = tx.objectStore('files');
      return new Promise((res, rej) => {
        const req = store.getAll();
        req.onsuccess = e => res(e.target.result);
        req.onerror = e => rej(e.target.error);
      });
    }

    // ─── File helpers ────────────────────────────────────────────────────────────
    function getFileType(mime, name) {
      if (mime.startsWith('image/')) return 'image';
      if (mime.startsWith('video/')) return 'video';
      if (
        mime.startsWith('text/') ||
        mime.includes('pdf') ||
        mime.includes('word') ||
        mime.includes('spreadsheet') ||
        mime.includes('presentation') ||
        /\.(pdf|doc|docx|xls|xlsx|ppt|pptx|txt|md|csv)$/i.test(name)
      ) return 'doc';
      return 'other';
    }

    function typeEmoji(t) {
      return { image: '🖼️', video: '🎬', doc: '📄', other: '📦' }[t] || '📦';
    }

    function formatSize(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 ** 2) return (bytes / 1024).toFixed(1) + ' KB';
      if (bytes < 1024 ** 3) return (bytes / 1024 ** 2).toFixed(1) + ' MB';
      return (bytes / 1024 ** 3).toFixed(2) + ' GB';
    }

    function formatDate(ts) {
      return new Date(ts).toLocaleString(undefined, {
        month: 'short', day: 'numeric', year: 'numeric',
        hour: '2-digit', minute: '2-digit'
      });
    }

    function uniqueId() {
      return Date.now().toString(36) + Math.random().toString(36).slice(2);
    }

    // ─── Read file as DataURL (chunked for large files) ───────────────────────
    function readAsDataURL(file) {
      return new Promise((res, rej) => {
        const reader = new FileReader();
        reader.onload = e => res(e.target.result);
        reader.onerror = e => rej(e.target.error);
        reader.readAsDataURL(file);
      });
    }

    // ─── Upload ──────────────────────────────────────────────────────────────────
    async function handleFiles(files) {
      const arr = Array.from(files);
      if (!arr.length) return;
      const prog = document.getElementById('upload-progress');
      const fill = document.getElementById('progress-fill');
      const pct = document.getElementById('progress-pct');
      const name = document.getElementById('progress-name');
      prog.classList.add('active');

      for (let i = 0; i < arr.length; i++) {
        const file = arr[i];
        name.textContent = `Storing ${file.name}…`;
        fill.style.width = '0%';
        pct.textContent = '0%';

        try {
          // Simulate progress (actual read is async)
          let progress = 0;
          const interval = setInterval(() => {
            progress = Math.min(progress + Math.random() * 15, 85);
            fill.style.width = progress + '%';
            pct.textContent = Math.round(progress) + '%';
          }, 80);

          const dataUrl = await readAsDataURL(file);
          clearInterval(interval);
          fill.style.width = '100%';
          pct.textContent = '100%';

          const fileObj = {
            id: uniqueId(),
            name: file.name,
            size: file.size,
            mime: file.type || 'application/octet-stream',
            type: getFileType(file.type || '', file.name),
            added: Date.now(),
            dataUrl
          };

          await saveFileToDB(fileObj);
          allFiles.unshift(fileObj);
          toast(`✅ ${file.name} saved`, 'success');
        } catch (e) {
          toast(`❌ Failed: ${file.name}`, 'error');
        }
      }

      prog.classList.remove('active');
      updateStats();
      renderGrid();
    }

    // ─── Render ──────────────────────────────────────────────────────────────────
    function getVisible() {
      let list = [...allFiles];

      // filter
      if (currentFilter !== 'all') list = list.filter(f => f.type === currentFilter);

      // search
      if (currentSearch) {
        const q = currentSearch.toLowerCase();
        list = list.filter(f => f.name.toLowerCase().includes(q));
      }

      // sort
      switch (currentSort) {
        case 'newest': list.sort((a, b) => b.added - a.added); break;
        case 'oldest': list.sort((a, b) => a.added - b.added); break;
        case 'name': list.sort((a, b) => a.name.localeCompare(b.name)); break;
        case 'size-desc': list.sort((a, b) => b.size - a.size); break;
        case 'size-asc': list.sort((a, b) => a.size - b.size); break;
      }

      return list;
    }

    function renderGrid() {
      const grid = document.getElementById('file-grid');
      const empty = document.getElementById('empty-state');
      const vis = getVisible();

      // Remove old cards (not empty-state)
      Array.from(grid.children).forEach(c => {
        if (!c.classList.contains('empty-state')) c.remove();
      });

      if (!vis.length) {
        empty.classList.add('visible');
        return;
      }

      empty.classList.remove('visible');

      vis.forEach(f => {
        const card = document.createElement('div');
        card.className = 'file-card' + (selectedIds.has(f.id) ? ' selected' : '');
        card.dataset.id = f.id;

        const thumbClass = { image: 'thumb-img', video: 'thumb-vid', doc: 'thumb-doc', other: 'thumb-other' }[f.type];
        const badgeClass = { image: 'badge-img', video: 'badge-vid', doc: 'badge-doc', other: 'badge-other' }[f.type];
        const ext = f.name.split('.').pop().toUpperCase().slice(0, 6);

        let thumbContent = `<span>${typeEmoji(f.type)}</span>`;
        if (f.type === 'image') {
          thumbContent = `<img src="${f.dataUrl}" alt="${f.name}" loading="lazy">`;
        } else if (f.type === 'video') {
          thumbContent = `<video src="${f.dataUrl}" muted preload="metadata"></video><span style="position:absolute;font-size:2rem;filter:drop-shadow(0 0 4px #000)">▶️</span>`;
        }

        card.innerHTML = `
      <div class="file-thumb ${thumbClass}">
        ${thumbContent}
        <span class="type-badge ${badgeClass}">${ext}</span>
        <div class="select-check" id="chk-${f.id}">✓</div>
      </div>
      <div class="file-info">
        <div class="file-name" title="${f.name}">${f.name}</div>
        <div class="file-meta">
          <span>${formatSize(f.size)}</span>
          <span>${new Date(f.added).toLocaleDateString()}</span>
        </div>
      </div>
    `;

        card.addEventListener('click', (e) => {
          if (e.ctrlKey || e.metaKey || e.shiftKey) {
            toggleSelect(f.id, card);
          } else if (selectedIds.size > 0) {
            toggleSelect(f.id, card);
          } else {
            openLightbox(f);
          }
        });

        card.addEventListener('contextmenu', (e) => {
          e.preventDefault();
          toggleSelect(f.id, card);
        });

        grid.appendChild(card);
      });
    }

    // ─── Selection ───────────────────────────────────────────────────────────────
    function toggleSelect(id, card) {
      if (selectedIds.has(id)) {
        selectedIds.delete(id);
        card.classList.remove('selected');
      } else {
        selectedIds.add(id);
        card.classList.add('selected');
      }
      updateBulkBar();
    }

    function clearSelection() {
      selectedIds.clear();
      document.querySelectorAll('.file-card.selected').forEach(c => c.classList.remove('selected'));
      updateBulkBar();
    }

    function updateBulkBar() {
      const bar = document.getElementById('bulk-bar');
      const cnt = document.getElementById('bulk-count');
      if (selectedIds.size > 0) {
        bar.classList.add('active');
        cnt.textContent = selectedIds.size + (selectedIds.size === 1 ? ' selected' : ' selected');
      } else {
        bar.classList.remove('active');
      }
    }

    async function deleteSelected() {
      for (const id of selectedIds) {
        await deleteFileFromDB(id);
        allFiles = allFiles.filter(f => f.id !== id);
      }
      const n = selectedIds.size;
      selectedIds.clear();
      updateBulkBar();
      updateStats();
      renderGrid();
      toast(`🗑 Deleted ${n} file${n !== 1 ? 's' : ''}`, 'error');
    }

    function downloadSelected() {
      selectedIds.forEach(id => {
        const f = allFiles.find(x => x.id === id);
        if (f) downloadFile(f);
      });
      clearSelection();
    }

    // ─── Stats ───────────────────────────────────────────────────────────────────
    function updateStats() {
      document.getElementById('stat-count').textContent = allFiles.length;
      const total = allFiles.reduce((s, f) => s + f.size, 0);
      document.getElementById('stat-size').textContent = formatSize(total);
    }

    // ─── Clear All ───────────────────────────────────────────────────────────────
    async function clearAll() {
      if (!allFiles.length) return;
      if (!confirm(`Delete all ${allFiles.length} files? This cannot be undone.`)) return;
      await clearDB();
      allFiles = [];
      selectedIds.clear();
      updateStats();
      updateBulkBar();
      renderGrid();
      toast('🗑 All files deleted', 'error');
    }

    // ─── Download ────────────────────────────────────────────────────────────────
    function downloadFile(f) {
      const a = document.createElement('a');
      a.href = f.dataUrl;
      a.download = f.name;
      a.click();
    }

    // ─── Lightbox ────────────────────────────────────────────────────────────────
    function openLightbox(f) {
      currentFile = f;
      document.getElementById('lb-title').textContent = f.name;
      const body = document.getElementById('lb-body');
      body.innerHTML = '';

      if (f.type === 'image') {
        const img = document.createElement('img');
        img.src = f.dataUrl;
        img.alt = f.name;
        body.appendChild(img);
      } else if (f.type === 'video') {
        const vid = document.createElement('video');
        vid.src = f.dataUrl;
        vid.controls = true;
        vid.autoplay = true;
        body.appendChild(vid);
      } else if (f.mime === 'application/pdf') {
        const iframe = document.createElement('iframe');
        iframe.src = f.dataUrl;
        body.appendChild(iframe);
      } else if (f.mime.startsWith('text/')) {
        fetch(f.dataUrl)
          .then(r => r.text())
          .then(txt => {
            const pre = document.createElement('pre');
            pre.style.cssText = 'color:var(--text);font-family:Space Mono,monospace;font-size:.8rem;overflow:auto;max-height:50vh;white-space:pre-wrap;word-break:break-all;text-align:left;';
            pre.textContent = txt;
            body.appendChild(pre);
          });
      } else {
        body.innerHTML = `<div class="file-placeholder">
      <div class="big-icon">${typeEmoji(f.type)}</div>
      <p style="margin-bottom:12px">${f.name}</p>
      <p style="font-size:.8rem">Preview not available for this file type.</p>
    </div>`;
      }

      document.getElementById('lb-meta').innerHTML = `
    <div class="meta-item"><strong>${f.name}</strong>File name</div>
    <div class="meta-item"><strong>${formatSize(f.size)}</strong>Size</div>
    <div class="meta-item"><strong>${f.mime || 'Unknown'}</strong>Type</div>
    <div class="meta-item"><strong>${formatDate(f.added)}</strong>Added</div>
  `;

      document.getElementById('lightbox').classList.add('open');
    }

    function closeLightbox(e) {
      if (!e || e.target === document.getElementById('lightbox')) {
        document.getElementById('lightbox').classList.remove('open');
        const vid = document.querySelector('#lb-body video');
        if (vid) { vid.pause(); vid.src = ''; }
        currentFile = null;
      }
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closeLightbox({ target: document.getElementById('lightbox') });
    });

    // ─── Toast ───────────────────────────────────────────────────────────────────
    function toast(msg, type = '') {
      const c = document.getElementById('toast-container');
      const el = document.createElement('div');
      el.className = 'toast' + (type ? ' ' + type : '');
      el.textContent = msg;
      c.appendChild(el);
      setTimeout(() => el.remove(), 3000);
    }

    // ─── Drop Zone ───────────────────────────────────────────────────────────────
    const dz = document.getElementById('drop-zone');

    dz.addEventListener('dragover', e => {
      e.preventDefault();
      dz.classList.add('dragging');
    });

    dz.addEventListener('dragleave', e => {
      if (!dz.contains(e.relatedTarget)) dz.classList.remove('dragging');
    });

    dz.addEventListener('drop', e => {
      e.preventDefault();
      dz.classList.remove('dragging');
      handleFiles(e.dataTransfer.files);
    });

    document.body.addEventListener('dragover', e => e.preventDefault());
    document.body.addEventListener('drop', e => {
      e.preventDefault();
      if (!dz.contains(e.target)) handleFiles(e.dataTransfer.files);
    });

    document.getElementById('file-input').addEventListener('change', e => {
      handleFiles(e.target.files);
      e.target.value = '';
    });

    // ─── Filter / Search / Sort ──────────────────────────────────────────────────
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        currentFilter = tab.dataset.filter;
        renderGrid();
      });
    });

    document.getElementById('search-input').addEventListener('input', e => {
      currentSearch = e.target.value.trim();
      renderGrid();
    });

    document.getElementById('sort-select').addEventListener('change', e => {
      currentSort = e.target.value;
      renderGrid();
    });

    // ─── Init ────────────────────────────────────────────────────────────────────
    (async () => {
      db = await openDB();
      allFiles = await loadAllFromDB();
      allFiles.sort((a, b) => b.added - a.added);
      updateStats();
      renderGrid();
    })();
  </script>
</body>

</html>
